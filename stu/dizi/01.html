<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弟子规学习周 - 第1周：首孝悌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(180deg, #a6e3ff 0%, #ffd6f4 100%);
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            position: relative;
        }
        
        /* 云朵动画 */
        .cloud {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            z-index: 1;
        }
        
        .cloud-1 {
            width: 200px;
            height: 80px;
            top: 80px;
            left: 200px;
            animation: floatCloud 30s infinite linear;
        }
        
        .cloud-2 {
            width: 150px;
            height: 60px;
            top: 150px;
            right: 300px;
            animation: floatCloud 35s infinite linear reverse;
        }
        
        .cloud-3 {
            width: 180px;
            height: 70px;
            bottom: 200px;
            left: 400px;
            animation: floatCloud 40s infinite linear;
        }
        
        @keyframes floatCloud {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }
        
        /* 主容器 */
        .main-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            padding-bottom: 100px;
        }
        
        /* 顶部区域 */
        .header {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            position: relative;
            flex-shrink: 0;
        }
        
        .title-area {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .title-icon {
            font-size: 80px;
            color: #ff6b8b;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .title-text {
            font-size: 70px;
            color: #5a3d8a;
            text-shadow: 5px 5px 0 #ffd166;
            letter-spacing: 5px;
        }
        
        .week-indicator {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .week-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #ffccf9;
            border: 4px solid #ff6b8b;
        }
        
        .week-dot.active {
            background-color: #ff6b8b;
            transform: scale(1.3);
            box-shadow: 0 0 15px #ff6b8b;
        }
        
        /* 内容区域 - 修改为垂直排列 */
        .content-area {
            display: flex;
            flex-direction: column;
            padding: 0 40px 40px 40px;
            gap: 40px;
            flex: 1;
        }
        
        /* 圣人爷爷区域 - 现在在最上面 */
        .sage-area {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 12px solid #ffd166;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            width: 100%;
        }
        
        .sage-title {
            font-size: 50px;
            color: #7c5cc4;
            margin-bottom: 30px;
            text-align: center;
            background-color: #e6f7ff;
            padding: 15px 40px;
            border-radius: 50px;
            border: 6px dashed #8ac6ff;
        }
        
        .sage-content {
    display: flex;
    width: 100%;
    gap: 40px;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 30px;
}

/* 给左边的.sage-image-container设置固定宽度 */
.sage-image-container {
    flex: 0 0 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
}


        
        .sage-image {
            width: 300px;
            height: 300px;
            background-color: #fff9e6;
            border-radius: 50%;
            border: 15px solid #ffd166;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        
        .sage-image::before {
            content: "👴";
            font-size: 180px;
            position: relative;
            top: -15px;
        }
        
        .sage-image::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: #7c5cc4;
            border-radius: 50%;
        }
        
        .wisdom-light {
            position: absolute;
            top: 100px;
            right: 50px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffff99 0%, #ffd166 70%, transparent 100%);
            border-radius: 50%;
            animation: glow 3s infinite alternate;
            z-index: 2;
        }
        
        @keyframes glow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        
        .sage-places {
            flex: 1;
            display: flex;
            /* 移除 flex-direction: column 或改为 row */
            flex-direction: row; /* 水平排列 */
            gap: 20px; /* 元素之间的间距 */
        } 
        /* 修改 .sage-places 的样式（只改这一处） */
        .sage-places {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        /* 如果你想要两个图片有固定大小，可以添加 */
        .sage-places .image-placeholder {
            width: 41%;
            height: 41%;
            object-fit: contain;
            flex-shrink: 0;
        }       
        .sage-button {
            background-color: #ff9e6d;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 25px 50px;
            font-size: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(255, 158, 109, 0.4);
            width: 80%;
        }
        
        .sage-button:hover {
            transform: translateY(-10px);
            background-color: #ff6b8b;
            box-shadow: 0 15px 35px rgba(255, 107, 139, 0.6);
        }
        
        /* 中间区域 - 孝悌剧场 */
        .theater-area {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
        }
        
        .theater-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 10px solid;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }
        
        .card-xiao {
            border-color: #ff6b8b;
        }
        
        .card-ti {
            border-color: #8ac6ff;
        }
        
        .card-title {
            font-size: 45px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .card-title-xiao {
            color: #ff6b8b;
        }
        
        .card-title-ti {
            color: #5a3d8a;
        }
        
        .card-icon {
            font-size: 60px;
        }
        
        .scene-container {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
        }
        
        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .character-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .character-name {
            font-size: 35px;
            color: #5a3d8a;
            background-color: #e6f7ff;
            padding: 10px 25px;
            border-radius: 30px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        
        .action-btn {
            background-color: #9dffb0;
            border: 6px solid #5a3d8a;
            border-radius: 40px;
            padding: 25px 40px;
            font-size: 35px;
            color: #5a3d8a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            transform: translateY(-8px);
            background-color: #8ac6ff;
            color: white;
        }
        
        /* 底部区域 - 爱心银行 */
        .bank-area {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 12px solid #c68dff;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            width: 100%;
        }
        
        .bank-title {
            font-size: 50px;
            color: #7c5cc4;
            margin-bottom: 30px;
            text-align: center;
            background-color: #ffccf9;
            padding: 15px 40px;
            border-radius: 50px;
            border: 6px solid #ff6b8b;
        }
        
        .bank-content {
            display: flex;
            flex: 1;
            gap: 40px;
        }
        
        .bank-jar {
            flex: 1;
            background-color: #e6f7ff;
            border-radius: 30px;
            border: 10px solid #ffd166;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .coins-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            min-height: 100px;
        }
        
        .coin {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            animation: coinDrop 0.5s ease-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes coinDrop {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            100% { transform: translateY(0) rotate(360deg); opacity: 1; }
        }
        
        .bank-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .bank-btn {
            background-color: #ff9e6d;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 25px;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.3s;
        }
        
        .bank-btn:hover {
            background-color: #ff6b8b;
            transform: translateY(-5px);
        }
        
        .counter {
            text-align: center;
            font-size: 50px;
            color: #ff6b8b;
            font-weight: bold;
            margin-top: 20px;
        }
        
        /* 底部区域 */
        .footer {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.8);
            border-top: 8px solid #ffd166;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .footer-text {
            font-size: 35px;
            color: #7c5cc4;
        }
        
        /* 对话泡泡 */
        .speech-bubble {
            position: absolute;
            background-color: white;
            padding: 25px;
            border-radius: 30px;
            border: 6px solid #8ac6ff;
            font-size: 30px;
            color: #5a3d8a;
            max-width: 400px;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
        }
        
        .bubble-1 {
            top: 150px;
            right: 200px;
        }
        
        .bubble-2 {
            bottom: 150px;
            left: 200px;
        }
        
        /* 浮动爱心 */
        .floating-heart {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            z-index: 5;
            animation: floatHeart 8s linear infinite;
        }
        
        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* 图片占位符 */
        .image-placeholder {
            width: 80%;
            height: 80%;
            background-color: #f0f0f0;
            border-radius: 20px;
            border: 5px dashed #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 30px;
        }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .header {
                padding: 0 30px;
            }
            
            .title-text {
                font-size: 50px;
            }
            
            .sage-content, .bank-content {
                flex-direction: column;
                gap: 30px;
            }
            
            .sage-image {
                width: 250px;
                height: 250px;
            }
            
            .sage-image::before {
                font-size: 150px;
            }
            
            .sage-button, .action-btn, .bank-btn {
                font-size: 30px;
                padding: 20px 30px;
            }
        }
        
        @media (max-width: 768px) {
            .header {
                height: auto;
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }
            
            .title-text {
                font-size: 40px;
            }
            
            .content-area {
                padding: 20px;
                gap: 30px;
            }
            
            .sage-title, .bank-title {
                font-size: 35px;
                padding: 10px 20px;
            }
            
            .card-title {
                font-size: 35px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 20px;
            }
            
            .scene-container {
                flex-direction: column;
                gap: 30px;
            }
            
            .character-img {
                width: 120px;
                height: 120px;
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- 云朵背景 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    
    <!-- 浮动爱心 -->
    <div id="floatingHearts"></div>
    
    <!-- 对话泡泡 -->
    <div class="speech-bubble bubble-1" id="bubble1">
        欢迎来到弟子规乐园！我是圣人爷爷👴
    </div>
    
    <div class="speech-bubble bubble-2" id="bubble2">
        爱是快乐城堡的地基！
    </div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部区域 -->
        <div class="header">
            <div class="title-area">
                <div class="title-icon">📚</div>
                <div class="title-text">弟子规学习周</div>
            </div>
            
            <div class="week-indicator">
                <div class="week-dot active"></div>
                <div class="week-dot"></div>
                <div class="week-dot"></div>
                <div class="week-dot"></div>
            </div>
        </div>
        
        <!-- 内容区域 - 现在改为垂直排列 -->
        <div class="content-area">
            <!-- 第一部分：圣人爷爷 -->
            <div class="sage-area">
                <div class="sage-title">圣人爷爷的智慧之光</div>
                
                <div class="sage-content">
                    <div class="sage-image-container">
                        <div class="sage-image">
                            <div class="wisdom-light"></div>
                        </div>
                    </div>
                    <div class="sage-places">
                        <!-- 孔子/白胡子老爷爷图片 -->
                        <img src="http://video.kaixin.wiki/dizi/sage-grandpa.png" 
                             alt="圣人爷爷"
                             class="image-placeholder">
                        
                        <!-- 智慧之光卡片图片 -->

                             class="image-placeholder">
                    </div>
                </div>
                
                <button class="sage-button" onclick="receiveWisdom()">
                    <i class="fas fa-hands"></i> 接收智慧之光
                </button>
            </div>
            
            <!-- 第二部分：孝悌剧场 -->
            <div class="theater-area">
                <!-- 孝的剧场 -->
                <div class="theater-card card-xiao">
                    <div class="card-title card-title-xiao">
                        <i class="fas fa-home card-icon"></i> "孝"的剧场：温暖的感觉
                    </div>
                    
                    <div class="scene-container">
                        <div class="character">
                            <div class="character-img" style="background-color: #ffccf9;">
                                👨
                            </div>
                            <div class="character-name">爸爸</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #9dffb0;">

                            </div>
                            <div class="character-name">宝宝</div>
                        </div>
                    </div>
                    
                    <!-- 图片占位符3：爸爸疲惫场景 -->
                    <div style="margin-left: 28%;">
                        
                        <img src="http://video.kaixin.wiki/dizi/fa.png"

                    </div>
                    
                    <div class="action-buttons">

                <!-- 悌的剧场 -->
                <div class="theater-card card-ti">

            <!-- 第三部分：爱心银行 -->

                <div class="bank-content">
                    <div class="bank-jar">
                        <div class="coins-container" id="coinsContainer">
                            <!-- 爱心币会动态添加到这里 -->
                        </div>
                    </div>
                    
                    <div class="bank-controls">
                        <button class="bank-btn" onclick="addCoin('hug')">
                            <i class="fas fa-hands"></i> 记录一个拥抱

                        <button class="bank-btn" onclick="addCoin('share')">

                        <button class="bank-btn" onclick="addCoin('love')">

    <!-- 底部区域 -->

        <div class="footer-text">爱是快乐城堡的地基！每天都要表达爱哦！</div>
    </div>

    <script>
        // 初始化变量
        let coinCount = 0;
        let coins = [];
        let bubbleVisible = false;
        const STORAGE_KEY = 'dizi_week1_state';
        
        // 创建浮动爱心背景
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const heartCount = 15;
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heart.style.color = ['#ff6b8b', '#ff9e6d', '#c68dff', '#8ac6ff'][Math.floor(Math.random() * 4)];
                heart.style.fontSize = (30 + Math.random() * 40) + 'px';
                container.appendChild(heart);
            }
        }
        
        // 显示对话泡泡
        function showBubbles() {
            const bubble1 = document.getElementById('bubble1');
            const bubble2 = document.getElementById('bubble2');
            
            // 随机显示泡泡
            if (Math.random() > 0.5 && !bubbleVisible) {
                bubble1.style.display = 'block';
                bubbleVisible = true;
                
                setTimeout(() => {
                    bubble1.style.display = 'none';
                    setTimeout(() => {
                        bubble2.style.display = 'block';
                        setTimeout(() => {
                            bubble2.style.display = 'none';
                            bubbleVisible = false;
                        }, 3000);
                    }, 1000);
                }, 3000);
            }
        }
        
        // 接收智慧之光
        function receiveWisdom() {
            // 创建智慧之光动画
            const light = document.createElement('div');
            light.style.position = 'fixed';
            light.style.top = '300px';
            light.style.left = '50%';
            light.style.transform = 'translateX(-50%)';
            light.style.width = '100px';
            light.style.height = '100px';
            light.style.background = 'radial-gradient(circle, #ffff99 0%, #ffd166 70%, transparent 100%)';
            light.style.borderRadius = '50%';
            light.style.zIndex = '100';
            light.style.animation = 'glow 1s alternate infinite';
            
            document.body.appendChild(light);
            
            // 光飞向心脏的动画
            setTimeout(() => {
                light.style.transition = 'all 2s ease-out';
                light.style.transform = 'translate(0, 300px) scale(0.2)';
                light.style.opacity = '0.5';
            }, 1000);
            
            // 显示消息
            setTimeout(() => {
                showMessage('✨ 你已接收圣人爷爷的智慧之光！ ✨');
                light.remove();
                
                // 添加3个爱心币作为奖励
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => addCoin('wisdom'), i * 300);
                }
            }, 3000);
        }
        
        // 孝的剧场行动
        function actXiao(action) {
            if (action === 'hug') {
                showMessage('🤗 你给了爸爸一个温暖的拥抱！爸爸心里甜甜的，暖暖的！');
                
                // 动画效果
                createHeartAnimation(window.innerWidth / 2, window.innerHeight / 2);
                createHeartAnimation(window.innerWidth / 2 + 50, window.innerHeight / 2 + 50);
                
                // 添加爱心币
                addCoin('hug');
            } else {
                showMessage('🧸 你选择继续玩玩具...试试给爸爸一个拥抱吧！');
            }
        }
        
        // 悌的剧场行动
        function actTi(action) {
            if (action === 'share') {
                showMessage('🍪 你分享了一块饼干给妹妹！看着妹妹开心的样子，你手里的饼干变得更甜了！');
                
                // 动画效果
                createHeartAnimation(window.innerWidth / 2, window.innerHeight / 2);
                createHeartAnimation(window.innerWidth / 2 + 50, window.innerHeight / 2 + 50);
                
                // 添加爱心币
                addCoin('share');
            } else {
                showMessage('🍪 你选择自己吃掉了两块饼干...试试分享一块给妹妹吧！');
            }
        }
        
        // 添加爱心币
        function addCoin(type) {
            coinCount++;
            document.getElementById('coinCount').textContent = coinCount;
            
            // 创建爱心币
            const coin = document.createElement('div');
            coin.classList.add('coin');
            
            // 根据类型设置不同的颜色和图标
            let bgColor, emoji;
            switch(type) {
                case 'hug':
                    bgColor = '#ffccf9';
                    emoji = '🤗';
                    break;
                case 'share':
                    bgColor = '#9dffb0';
                    emoji = '🍪';
                    break;
                case 'love':
                    bgColor = '#ff6b8b';
                    emoji = '❤️';
                    break;
                case 'help':
                    bgColor = '#8ac6ff';
                    emoji = '🙌';
                    break;
                case 'wisdom':
                    bgColor = '#ffd166';
                    emoji = '✨';
                    break;
                default:
                    bgColor = '#c68dff';
                    emoji = '⭐';
            }
            
            coin.style.backgroundColor = bgColor;
            coin.innerHTML = emoji;
            
            // 添加到容器
            document.getElementById('coinsContainer').appendChild(coin);
            
            // 保存引用
            coins.push(coin);
            
            // 显示消息
            const messages = {
                'hug': '🤗 记录了一个温暖的拥抱！',
                'share': '🍪 记录了一次快乐的分享！',
                'love': '❤️ 记录了一句"我爱你"！',
                'help': '🙌 记录了一次帮忙！',
                'wisdom': '✨ 智慧之光带来的爱心！'
            };
            
            if (messages[type]) {
                showMessage(messages[type]);
            }
            
            // 如果罐子快满了，显示庆祝消息
            if (coinCount === 10) {
                setTimeout(() => {
                    showMessage('🎉 爱心银行快满啦！继续加油哦！ 🎉');
                }, 500);
            }
            
            if (coinCount === 20) {
                setTimeout(() => {
                    showMessage('🏆 太棒了！爱心银行已经满了！你们家充满了爱！ 🏆');
                    
                    // 庆祝动画
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createHeartAnimation(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight
                            );
                        }, i * 100);
                    }
                }, 500);
            }
        }
        
        // 创建爱心动画
        function createHeartAnimation(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = '50px';
            heart.style.zIndex = '100';
            heart.style.animation = 'heartPulse 1.5s forwards';
            
            document.body.appendChild(heart);
            
            // 添加动画样式
            if (!document.querySelector('#heartPulseStyle')) {
                const style = document.createElement('style');
                style.id = 'heartPulseStyle';
                style.textContent = `
                    @keyframes heartPulse {
                        0% { transform: scale(0.2); opacity: 1; }
                        50% { transform: scale(1.3); opacity: 0.8; }
                        100% { transform: scale(0.5); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            setTimeout(() => heart.remove(), 1500);
        }
        
        // 显示消息
        function showMessage(text) {
            // 移除已存在的消息
            const existingMsg = document.querySelector('.message-bubble');
            if (existingMsg) existingMsg.remove();
            
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message-bubble');
            messageDiv.textContent = text;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '50%';
            messageDiv.style.left = '50%';
            messageDiv.style.transform = 'translate(-50%, -50%)';
            messageDiv.style.backgroundColor = 'rgba(255, 255, 255, 0.95)';
            messageDiv.style.color = '#5a3d8a';
            messageDiv.style.fontSize = '45px';
            messageDiv.style.padding = '40px 60px';
            messageDiv.style.borderRadius = '40px';
            messageDiv.style.border = '10px solid #ff6b8b';
            messageDiv.style.boxShadow = '0 20px 50px rgba(0,0,0,0.3)';
            messageDiv.style.zIndex = '1000';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.lineHeight = '1.5';
            messageDiv.style.maxWidth = '80%';
            
            document.body.appendChild(messageDiv);
            
            // 3秒后消失
            setTimeout(() => {
                messageDiv.style.transition = 'opacity 0.5s';
                messageDiv.style.opacity = '0';
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        document.body.removeChild(messageDiv);
                    }
                }, 500);
            }, 3000);
        }
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(event) {
            // 空格键添加爱心币
            if (event.code === 'Space') {
                const types = ['hug', 'share', 'love', 'help'];
                const type = types[Math.floor(Math.random() * types.length)];
                addCoin(type);
                event.preventDefault();
            }
            
            // 回车键显示智慧之光
            if (event.code === 'Enter') {
                receiveWisdom();
                event.preventDefault();
            }
        });
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ coins: coins }));
        }

        function renderCoin(type) {
            const coin = document.createElement('div');
            coin.classList.add('coin');

            const styles = {
                hug: ['#ffccf9', '🤗'],
                share: ['#9dffb0', '🍪'],
                love: ['#ff6b8b', '❤️'],
                help: ['#8ac6ff', '🙌'],
                wisdom: ['#ffd166', '✨']
            };
            const [bgColor, emoji] = styles[type] || ['#c68dff', '🌟'];
            coin.style.backgroundColor = bgColor;
            coin.innerHTML = emoji;
            document.getElementById('coinsContainer').appendChild(coin);
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            const state = JSON.parse(raw);
            coins = Array.isArray(state.coins) ? state.coins.slice() : [];
            document.getElementById('coinsContainer').innerHTML = '';
            coins.forEach(renderCoin);
            coinCount = coins.length;
            document.getElementById('coinCount').textContent = coinCount;
            return coinCount > 0;
        }

        addCoin = function(type) {
            coinCount++;
            document.getElementById('coinCount').textContent = coinCount;
            renderCoin(type);
            coins.push(type);
            saveState();

            const messages = {
                hug: '🤗 记录了一个温暖的拥抱！',
                share: '🍪 记录了一次快乐的分享！',
                love: '❤️ 记录了一句“我爱你”！',
                help: '🙌 记录了一次帮助！',
                wisdom: '✨ 智慧之光带来了爱心！'
            };
            if (messages[type]) showMessage(messages[type]);
        };

        window.onload = function() {
            createFloatingHearts();
            setInterval(showBubbles, 10000);

            const hasSavedState = loadState();
            if (!hasSavedState) {
                setTimeout(() => {
                    showMessage('👋 欢迎来到弟子规乐园！ 👋\n\n我是圣人爷爷，我要教你第一个爱的秘密！');
                }, 1500);
                setTimeout(() => addCoin('wisdom'), 3000);
                setTimeout(() => addCoin('love'), 3500);
            }
        };
    </script>
</body>
</html>
