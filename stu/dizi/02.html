<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弟子规学习周 - 第2周：次谨信</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(180deg, #a6e3ff 0%, #ffd6f4 100%);
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            position: relative;
        }
        
        /* 云朵动画 */
        .cloud {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            z-index: 1;
        }
        
        .cloud-1 {
            width: 200px;
            height: 80px;
            top: 80px;
            left: 200px;
            animation: floatCloud 30s infinite linear;
        }
        
        .cloud-2 {
            width: 150px;
            height: 60px;
            top: 150px;
            right: 300px;
            animation: floatCloud 35s infinite linear reverse;
        }
        
        .cloud-3 {
            width: 180px;
            height: 70px;
            bottom: 200px;
            left: 400px;
            animation: floatCloud 40s infinite linear;
        }
        
        @keyframes floatCloud {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }
        
        /* 主容器 */
        .main-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            padding-bottom: 100px;
        }
        
        /* 顶部区域 */
        .header {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            position: relative;
            flex-shrink: 0;
        }
        
        .title-area {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .title-icon {
            font-size: 80px;
            color: #ff6b8b;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .title-text {
            font-size: 70px;
            color: #5a3d8a;
            text-shadow: 5px 5px 0 #ffd166;
            letter-spacing: 5px;
        }
        
        .week-indicator {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .week-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #ffccf9;
            border: 4px solid #ff6b8b;
        }
        
        .week-dot.active {
            background-color: #ff6b8b;
            transform: scale(1.3);
            box-shadow: 0 0 15px #ff6b8b;
        }
        
        /* 内容区域 - 修改为垂直排列 */
        .content-area {
            display: flex;
            flex-direction: column;
            padding: 0 40px 40px 40px;
            gap: 40px;
            flex: 1;
        }
        
        /* 圣人爷爷区域 - 现在在最上面 */
        .sage-area {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 12px solid #ffd166;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            width: 100%;
        }
        
        .sage-title {
            font-size: 50px;
            color: #7c5cc4;
            margin-bottom: 30px;
            text-align: center;
            background-color: #e6f7ff;
            padding: 15px 40px;
            border-radius: 50px;
            border: 6px dashed #8ac6ff;
        }
        
        .sage-content {
            display: flex;
            width: 100%;
            gap: 40px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .sage-image-container {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .sage-image {
            width: 300px;
            height: 300px;
            background-color: #fff9e6;
            border-radius: 50%;
            border: 15px solid #ffd166;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        
        .sage-image::before {
            content: "👴";
            font-size: 180px;
            position: relative;
            top: -15px;
        }
        
        .sage-image::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: #7c5cc4;
            border-radius: 50%;
        }
        
        .wisdom-light {
            position: absolute;
            top: 100px;
            right: 50px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffff99 0%, #ffd166 70%, transparent 100%);
            border-radius: 50%;
            animation: glow 3s infinite alternate;
            z-index: 2;
        }
        
        @keyframes glow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        
        .sage-places {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        
        .sage-places .image-placeholder {
            width: 41%;
            height: 41%;
            object-fit: contain;
            flex-shrink: 0;
        }
        
        .sage-button {
            background-color: #ff9e6d;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 25px 50px;
            font-size: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(255, 158, 109, 0.4);
            width: 80%;
        }
        
        .sage-button:hover {
            transform: translateY(-10px);
            background-color: #ff6b8b;
            box-shadow: 0 15px 35px rgba(255, 107, 139, 0.6);
        }
        
        /* 中间区域 - 品格三重剧场 */
        .theater-area {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
        }
        
        .theater-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 10px solid;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }
        
        .card-jin {
            border-color: #8ac6ff;
        }
        
        .card-xin {
            border-color: #9dffb0;
        }
        
        .card-yan {
            border-color: #ffd166;
        }
        
        .card-title {
            font-size: 45px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .card-title-jin {
            color: #5a3d8a;
        }
        
        .card-title-xin {
            color: #ff6b8b;
        }
        
        .card-title-yan {
            color: #ffd166;
        }
        
        .card-icon {
            font-size: 60px;
        }
        
        .scene-container {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
        }
        
        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .character-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .character-name {
            font-size: 35px;
            color: #5a3d8a;
            background-color: #e6f7ff;
            padding: 10px 25px;
            border-radius: 30px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        
        .action-btn {
            background-color: #9dffb0;
            border: 6px solid #5a3d8a;
            border-radius: 40px;
            padding: 25px 40px;
            font-size: 35px;
            color: #5a3d8a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            transform: translateY(-8px);
            background-color: #8ac6ff;
            color: white;
        }
        
        /* 智慧问题区域 */
        .wisdom-question {
            text-align: center;
            font-size: 35px;
            color: #7c5cc4;
            margin-top: 20px;
            padding: 15px;
            background-color: #e6f7ff;
            border-radius: 30px;
            border: 4px dashed #8ac6ff;
        }
        
        /* 底部区域 - 智慧森林 */
        .forest-area {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            border: 12px solid #8ac6ff;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            width: 100%;
        }
        
        .forest-title {
            font-size: 50px;
            color: #5a3d8a;
            margin-bottom: 30px;
            text-align: center;
            background-color: #e6f7ff;
            padding: 15px 40px;
            border-radius: 50px;
            border: 6px dashed #8ac6ff;
        }
        
        .forest-content {
            display: flex;
            flex: 1;
            gap: 40px;
        }
        
        .trees-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .tree-row {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }
        
        .tree {
            flex: 1;
            background-color: #f0f8ff;
            border-radius: 30px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .tree.jin-tree {
            border: 10px solid #8ac6ff;
        }
        
        .tree.xin-tree {
            border: 10px solid #9dffb0;
        }
        
        .tree.yan-tree {
            border: 10px solid #ffd166;
        }
        
        .tree-title {
            font-size: 30px;
            color: #5a3d8a;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .tree-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        .fruits-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 100px;
        }
        
        .fruit {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            animation: fruitGrow 0.5s ease-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .fruit.jin-fruit {
            background-color: #8ac6ff;
        }
        
        .fruit.xin-fruit {
            background-color: #9dffb0;
        }
        
        .fruit.yan-fruit {
            background-color: #ffd166;
            color: #5a3d8a;
        }
        
        @keyframes fruitGrow {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .forest-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .forest-btn {
            background-color: #8ac6ff;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 25px;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.3s;
        }
        
        .forest-btn.jin-btn {
            background-color: #8ac6ff;
        }
        
        .forest-btn.xin-btn {
            background-color: #9dffb0;
            color: #5a3d8a;
        }
        
        .forest-btn.yan-btn {
            background-color: #ffd166;
            color: #5a3d8a;
        }
        
        .forest-btn:hover {
            transform: translateY(-5px);
        }
        
        .forest-btn.jin-btn:hover {
            background-color: #5a3d8a;
        }
        
        .forest-btn.xin-btn:hover {
            background-color: #7c5cc4;
            color: white;
        }
        
        .forest-btn.yan-btn:hover {
            background-color: #ff9e6d;
            color: white;
        }
        
        .special-btns {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .special-btn {
            flex: 1;
            background-color: #ff9e6d;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 20px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .special-btn:hover {
            background-color: #ff6b8b;
            transform: translateY(-5px);
        }
        
        .counter {
            text-align: center;
            font-size: 50px;
            color: #5a3d8a;
            font-weight: bold;
            margin-top: 20px;
        }
        
        /* 底部区域 */
        .footer {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.8);
            border-top: 8px solid #ffd166;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .footer-text {
            font-size: 35px;
            color: #7c5cc4;
        }
        
        /* 对话泡泡 */
        .speech-bubble {
            position: absolute;
            background-color: white;
            padding: 25px;
            border-radius: 30px;
            border: 6px solid #8ac6ff;
            font-size: 30px;
            color: #5a3d8a;
            max-width: 400px;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
        }
        
        .bubble-1 {
            top: 150px;
            right: 200px;
        }
        
        .bubble-2 {
            bottom: 150px;
            left: 200px;
        }
        
        /* 浮动爱心 */
        .floating-heart {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            z-index: 5;
            animation: floatHeart 8s linear infinite;
        }
        
        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* 图片占位符 */
        .image-placeholder {
            width: 80%;
            height: 80%;
            background-color: #f0f0f0;
            border-radius: 20px;
            border: 5px dashed #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 30px;
        }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .header {
                padding: 0 30px;
            }
            
            .title-text {
                font-size: 50px;
            }
            
            .sage-content, .forest-content {
                flex-direction: column;
                gap: 30px;
            }
            
            .sage-image {
                width: 250px;
                height: 250px;
            }
            
            .sage-image::before {
                font-size: 150px;
            }
            
            .sage-button, .action-btn, .forest-btn {
                font-size: 30px;
                padding: 20px 30px;
            }
            
            .tree-row {
                flex-direction: column;
            }
        }
        
        @media (max-width: 768px) {
            .header {
                height: auto;
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }
            
            .title-text {
                font-size: 40px;
            }
            
            .content-area {
                padding: 20px;
                gap: 30px;
            }
            
            .sage-title, .forest-title {
                font-size: 35px;
                padding: 10px 20px;
            }
            
            .card-title {
                font-size: 35px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 20px;
            }
            
            .scene-container {
                flex-direction: column;
                gap: 30px;
            }
            
            .character-img {
                width: 120px;
                height: 120px;
                font-size: 60px;
            }
            
            .wisdom-question {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 云朵背景 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    
    <!-- 浮动爱心 -->
    <div id="floatingHearts"></div>
    
    <!-- 对话泡泡 -->
    <div class="speech-bubble bubble-1" id="bubble1">
        欢迎来到弟子规乐园！我是圣人爷爷👴
    </div>
    
    <div class="speech-bubble bubble-2" id="bubble2">
        谨慎如水，诚信如光，谨言如风！
    </div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部区域 -->
        <div class="header">
            <div class="title-area">
                <div class="title-icon">📚</div>
                <div class="title-text">弟子规学习周</div>
            </div>
            
            <div class="week-indicator">
                <div class="week-dot"></div>
                <div class="week-dot active"></div>
                <div class="week-dot"></div>
                <div class="week-dot"></div>
            </div>
        </div>
        
        <!-- 内容区域 - 现在改为垂直排列 -->
        <div class="content-area">
            <!-- 第一部分：圣人爷爷的静心花园 -->
            <div class="sage-area">
                <div class="sage-title">圣人爷爷的静心花园</div>
                
                <div class="sage-content">
                    <div class="sage-image-container">
                        <div class="sage-image">
                            <div class="wisdom-light"></div>
                        </div>
                    </div>
                    <div class="sage-places">
                        <!-- 孔子/白胡子老爷爷图片 -->
                        <img src="imgs/sage-grandpa-garden.png" 
                             alt="圣人爷爷"
                             class="image-placeholder">
                        
                        <!-- 智慧之光卡片图片 -->
                        <img src="imgs/wisdom-stars-card.png" 
                             alt="智慧之星卡片"
                             class="image-placeholder">
                    </div>
                </div>
                
                <button class="sage-button" onclick="receiveWisdom()">
                    <i class="fas fa-star"></i> 点亮三颗智慧星
                </button>
            </div>
            
            <!-- 第二部分：品格三重剧场 -->
            <div class="theater-area">
                <!-- 谨慎如水剧场 -->
                <div class="theater-card card-jin">
                    <div class="card-title card-title-jin">
                        <i class="fas fa-tint card-icon"></i> 谨慎如水：端汤给妈妈
                    </div>
                    
                    <div class="scene-container">
                        <div class="character">
                            <div class="character-img" style="background-color: #e6f7ff;">
                                🥣
                            </div>
                            <div class="character-name">热汤</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #9dffb0;">
                                👶
                            </div>
                            <div class="character-name">宝宝</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #c68dff;">
                                👩
                            </div>
                            <div class="character-name">妈妈</div>
                        </div>
                    </div>
                    
                    <!-- 图片占位符：端汤场景 -->
                    <div style="margin-left: 28%;">
                        <img src="imgs/jin-shui.png" 
                             alt="端汤"
                             class="image-placeholder" style="width: 60%;height:60%;">
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn" onclick="actJin('rush')">
                            <i class="fas fa-running"></i> 急急忙忙
                        </button>
                        <button class="action-btn" onclick="actJin('steady')">
                            <i class="fas fa-tint"></i> 像水流一样平稳
                        </button>
                    </div>
                    
                    <div class="wisdom-question" id="jinQuestion">
                        当你安静时，身体会告诉你什么？
                    </div>
                </div>
                
                <!-- 诚信如光剧场 -->
                <div class="theater-card card-xin">
                    <div class="card-title card-title-xin">
                        <i class="fas fa-sun card-icon"></i> 诚信如光：朋友问铅笔
                    </div>
                    
                    <div class="scene-container">
                        <div class="character">
                            <div class="character-img" style="background-color: #ffccf9;">
                                ✏️
                            </div>
                            <div class="character-name">铅笔</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #8ac6ff;">
                                👶
                            </div>
                            <div class="character-name">宝宝</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #c68dff;">
                                👧
                            </div>
                            <div class="character-name">朋友</div>
                        </div>
                    </div>
                    
                    <!-- 图片占位符：铅笔场景 -->
                    <div style="margin-left: 28%;">
                        <img src="imgs/xin-guang.png" 
                             alt="铅笔"
                             class="image-placeholder" style="width: 60%;height:60%;">
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn" onclick="actXin('lie')">
                            <i class="fas fa-cloud"></i> 心里像乌云一样沉重
                        </button>
                        <button class="action-btn" onclick="actXin('truth')">
                            <i class="fas fa-sun"></i> 心里像阳光一样明亮
                        </button>
                    </div>
                    
                    <div class="wisdom-question" id="xinQuestion">
                        你的心什么时候最轻松？
                    </div>
                </div>
                
                <!-- 谨言如风剧场 -->
                <div class="theater-card card-yan">
                    <div class="card-title card-title-yan">
                        <i class="fas fa-wind card-icon"></i> 谨言如风：同学展示画作
                    </div>
                    
                    <div class="scene-container">
                        <div class="character">
                            <div class="character-img" style="background-color: #ffd166;">
                                🎨
                            </div>
                            <div class="character-name">画作</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #8ac6ff;">
                                👶
                            </div>
                            <div class="character-name">宝宝</div>
                        </div>
                        
                        <div class="character">
                            <div class="character-img" style="background-color: #c68dff;">
                                👦
                            </div>
                            <div class="character-name">同学</div>
                        </div>
                    </div>
                    
                    <!-- 图片占位符：画作场景 -->
                    <div style="margin-left: 28%;">
                        <img src="imgs/yan-feng.png" 
                             alt="画作"
                             class="image-placeholder" style="width: 60%;height:60%;">
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn" onclick="actYan('criticize')">
                            <i class="fas fa-snowflake"></i> 直接批评
                        </button>
                        <button class="action-btn" onclick="actYan('appreciate')">
                            <i class="fas fa-wind"></i> 先感受他的开心
                        </button>
                    </div>
                    
                    <div class="wisdom-question" id="yanQuestion">
                        你的话像春风还是冰雹？
                    </div>
                </div>
            </div>
            
            <!-- 第三部分：智慧森林 -->
            <div class="forest-area">
                <div class="forest-title">智慧森林</div>
                
                <div class="forest-content">
                    <div class="trees-container">
                        <div class="tree-row">
                            <div class="tree jin-tree">
                                <div class="tree-title">谨慎树</div>
                                <div class="tree-icon">💧</div>
                                <div class="fruits-container" id="jinFruits">
                                    <!-- 谨慎果实会动态添加到这里 -->
                                </div>
                            </div>
                            
                            <div class="tree xin-tree">
                                <div class="tree-title">诚信树</div>
                                <div class="tree-icon">☀️</div>
                                <div class="fruits-container" id="xinFruits">
                                    <!-- 诚信果实会动态添加到这里 -->
                                </div>
                            </div>
                        </div>
                        
                        <div class="tree-row">
                            <div class="tree yan-tree">
                                <div class="tree-title">谨言树</div>
                                <div class="tree-icon">🍃</div>
                                <div class="fruits-container" id="yanFruits">
                                    <!-- 谨言果实会动态添加到这里 -->
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="forest-controls">
                        <button class="forest-btn jin-btn" onclick="addFruit('jin')">
                            <i class="fas fa-tint"></i> 我选择像水一样谨慎
                        </button>
                        
                        <button class="forest-btn xin-btn" onclick="addFruit('xin')">
                            <i class="fas fa-sun"></i> 我选择像光一样诚信
                        </button>
                        
                        <button class="forest-btn yan-btn" onclick="addFruit('yan')">
                            <i class="fas fa-wind"></i> 我选择像风一样谨言
                        </button>
                        
                        <div class="special-btns">
                            <button class="special-btn" onclick="startMeditation()">
                                <i class="fas fa-moon"></i> 静心时刻
                            </button>
                            <button class="special-btn" onclick="openDiary()">
                                <i class="fas fa-book"></i> 品格日记
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="counter">
                    智慧果实: <span id="fruitCount">0</span> 个
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部区域 -->
    <div class="footer">
        <div class="footer-text">谨慎如水，诚信如光，谨言如风——品格的自然生长！</div>
    </div>

    <script>
        // 初始化变量
        let fruitCount = 0;
        let fruits = { jin: [], xin: [], yan: [] };
        let bubbleVisible = false;
        const STORAGE_KEY = 'dizi_week2_state';
        
        // 创建浮动爱心背景
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const heartCount = 15;
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heart.style.color = ['#ff6b8b', '#ff9e6d', '#c68dff', '#8ac6ff'][Math.floor(Math.random() * 4)];
                heart.style.fontSize = (30 + Math.random() * 40) + 'px';
                container.appendChild(heart);
            }
        }
        
        // 显示对话泡泡
        function showBubbles() {
            const bubble1 = document.getElementById('bubble1');
            const bubble2 = document.getElementById('bubble2');
            
            // 随机显示泡泡
            if (Math.random() > 0.5 && !bubbleVisible) {
                bubble1.style.display = 'block';
                bubbleVisible = true;
                
                setTimeout(() => {
                    bubble1.style.display = 'none';
                    setTimeout(() => {
                        bubble2.style.display = 'block';
                        setTimeout(() => {
                            bubble2.style.display = 'none';
                            bubbleVisible = false;
                        }, 3000);
                    }, 1000);
                }, 3000);
            }
        }
        
        // 接收智慧之光
        function receiveWisdom() {
            // 创建智慧之光动画
            const light = document.createElement('div');
            light.style.position = 'fixed';
            light.style.top = '300px';
            light.style.left = '50%';
            light.style.transform = 'translateX(-50%)';
            light.style.width = '100px';
            light.style.height = '100px';
            light.style.background = 'radial-gradient(circle, #ffff99 0%, #ffd166 70%, transparent 100%)';
            light.style.borderRadius = '50%';
            light.style.zIndex = '100';
            light.style.animation = 'glow 1s alternate infinite';
            
            document.body.appendChild(light);
            
            // 光飞向心脏的动画
            setTimeout(() => {
                light.style.transition = 'all 2s ease-out';
                light.style.transform = 'translate(0, 300px) scale(0.2)';
                light.style.opacity = '0.5';
            }, 1000);
            
            // 显示消息
            setTimeout(() => {
                showMessage('✨ 你已点亮三颗智慧星！ ✨');
                light.remove();
                
                // 添加3个智慧果实作为奖励（每种一个），不显示消息
                setTimeout(() => addFruit('jin', true), 300);
                setTimeout(() => addFruit('xin', true), 600);
                setTimeout(() => addFruit('yan', true), 900);
            }, 3000);
        }
        
        // 谨慎如水行动
        function actJin(action) {
            if (action === 'steady') {
                showMessage('💧 你选择了像水流一样平稳！汤没有洒出来，妈妈很开心！');
                
                // 动画效果
                createHeartAnimation(window.innerWidth / 2, window.innerHeight / 2);
                createHeartAnimation(window.innerWidth / 2 + 50, window.innerHeight / 2 + 50);
                
                // 添加谨慎果实
                addFruit('jin');
            } else {
                showMessage('🏃 你选择急急忙忙...汤洒出来了！试试像水流一样平稳吧！');
            }
        }
        
        // 诚信如光行动
        function actXin(action) {
            if (action === 'truth') {
                showMessage('☀️ 你选择了心里像阳光一样明亮！朋友信任你，你也感到轻松！');
                
                // 动画效果
                createHeartAnimation(window.innerWidth / 2, window.innerHeight / 2);
                createHeartAnimation(window.innerWidth / 2 + 50, window.innerHeight / 2 + 50);
                
                // 添加诚信果实
                addFruit('xin');
            } else {
                showMessage('☁️ 你选择了心里像乌云一样沉重...感觉不舒服吧？试试像阳光一样明亮！');
            }
        }
        
        // 谨言如风行动
        function actYan(action) {
            if (action === 'appreciate') {
                showMessage('🍃 你选择了先感受他的开心！同学很高兴，你们成了更好的朋友！');
                
                // 动画效果
                createHeartAnimation(window.innerWidth / 2, window.innerHeight / 2);
                createHeartAnimation(window.innerWidth / 2 + 50, window.innerHeight / 2 + 50);
                
                // 添加谨言果实
                addFruit('yan');
            } else {
                showMessage('❄️ 你选择直接批评...同学伤心了！试试像春风一样温暖吧！');
            }
        }
        
        // 添加智慧果实
        function addFruit(type) {
            fruitCount++;
            document.getElementById('fruitCount').textContent = fruitCount;
            
            // 创建智慧果实
            const fruit = document.createElement('div');
            fruit.classList.add('fruit');
            fruit.classList.add(type + '-fruit');
            
            // 根据类型设置不同的内容
            let text, emoji;
            switch(type) {
                case 'jin':
                    text = '谨';
                    emoji = '💧';
                    break;
                case 'xin':
                    text = '信';
                    emoji = '☀️';
                    break;
                case 'yan':
                    text = '言';
                    emoji = '🍃';
                    break;
                default:
                    text = '智';
                    emoji = '✨';
            }
            
            fruit.innerHTML = emoji;
            fruit.title = '点击思考：' + (type === 'jin' ? '当你安静时，身体会告诉你什么？' : 
                                      type === 'xin' ? '你的心什么时候最轻松？' : 
                                      '你的话像春风还是冰雹？');
            
            // 添加点击事件
            fruit.onclick = function() {
                const questions = {
                    'jin': '当你安静时，身体会告诉你什么？',
                    'xin': '你的心什么时候最轻松？',
                    'yan': '你的话像春风还是冰雹？'
                };
                showMessage(questions[type]);
            };
            
            // 添加到对应容器
            document.getElementById(type + 'Fruits').appendChild(fruit);
            
            // 保存引用
            fruits[type].push(fruit);
            
            // 显示消息
            const messages = {
                'jin': '💧 记录了像水一样谨慎的选择！',
                'xin': '☀️ 记录了像光一样诚信的选择！',
                'yan': '🍃 记录了像风一样谨言的选择！'
            };
            
            if (messages[type]) {
                showMessage(messages[type]);
            }
            
            // 如果森林快满了，显示庆祝消息
            if (fruitCount === 15) {
                setTimeout(() => {
                    showMessage('🎉 智慧森林长出很多果实啦！继续加油哦！ 🎉');
                }, 500);
            }
            
            if (fruitCount === 30) {
                setTimeout(() => {
                    showMessage('🏆 太棒了！智慧森林已经硕果累累！你是个有品格的好孩子！ 🏆');
                    
                    // 庆祝动画
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createHeartAnimation(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight
                            );
                        }, i * 100);
                    }
                }, 500);
            }
        }
        
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
                fruitCount: fruitCount,
                fruits: { 
                    jin: fruits.jin.length, 
                    xin: fruits.xin.length, 
                    yan: fruits.yan.length 
                } 
            }));
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            let state;
            try {
                state = JSON.parse(raw);
            } catch(e) {
                console.error("Failed to parse saved state:", e);
                return false;
            }
            
            if (typeof state.fruitCount !== 'number' || !state.fruits) return false;
            
            // 清空现有内容并重建
            fruitCount = state.fruitCount;
            document.getElementById('fruitCount').textContent = fruitCount;
            
            // 重建各类果实
            const containers = {
                'jin': document.getElementById('jinFruits'),
                'xin': document.getElementById('xinFruits'), 
                'yan': document.getElementById('yanFruits')
            };
            
            // 清空容器
            Object.values(containers).forEach(container => container.innerHTML = '');
            
            // 重新填充对应类型的果实
            for(const type of ['jin', 'xin', 'yan']) {
                const count = state.fruits[type];
                if(typeof count === 'number' && count > 0) {
                    for(let i = 0; i < count; i++) {
                        renderFruit(type);
                        fruits[type].push({});
                    }
                }
            }
            
            return fruitCount > 0;
        }
        
        function renderFruit(type) {
            const containerId = type + 'Fruits';
            const container = document.getElementById(containerId);
            if (!container) return;

            const fruit = document.createElement('div');
            fruit.classList.add('fruit');
            fruit.classList.add(type + '-fruit');

            let emoji;
            switch(type) {
                case 'jin': emoji = '💧'; break;
                case 'xin': emoji = '☀️'; break;  
                case 'yan': emoji = '🍃'; break;
                default: emoji = '✨';
            }
            
            fruit.innerHTML = emoji;
            fruit.title = '点击思考：' + (type === 'jin' ? '当你安静时，身体会告诉你什么？' : 
                                      type === 'xin' ? '你的心什么时候最轻松？' : 
                                      '你的话像春风还是冰雹？');
            
            fruit.onclick = function() {
                const questions = {
                    'jin': '当你安静时，身体会告诉你什么？',
                    'xin': '你的心什么时候最轻松？',
                    'yan': '你的话像春风还是冰雹？'
                };
                showMessage(questions[type]);
            };
            
            container.appendChild(fruit);
        }

        // 添加智慧果实
        function addFruit(type, silent=false) {
            fruitCount++;
            document.getElementById('fruitCount').textContent = fruitCount;

            renderFruit(type);
            fruits[type].push({});

            saveState();

            if(!silent) {
                const messages = {
                    'jin': '💧 记录了像水一样谨慎的选择！',
                    'xin': '☀️ 记录了像光一样诚信的选择！',
                    'yan': '🍃 记录了像风一样谨言的选择！'
                };
                
                if (messages[type]) {
                    showMessage(messages[type]);
                }
            }
            
            if (fruitCount === 15) {
                setTimeout(() => {
                    showMessage('🎉 智慧森林长出很多果实啦！继续加油哦！ 🎉');
                }, 500);
            }
            
            if (fruitCount === 30) {
                setTimeout(() => {
                    showMessage('🏆 太棒了！智慧森林已经硕果累累！你是个有品格的好孩子！ 🏆');
                    
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createHeartAnimation(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight
                            );
                        }, i * 100);
                    }
                }, 500);
            }
        };
        
        // 静心时刻
        function startMeditation() {
            showMessage('🧘‍♀️ 静心时刻开始！\n\n闭上眼睛，深呼吸...\n吸气4秒，屏息2秒，呼气6秒\n\n让我们一起安静30秒...');
            
            // 30秒倒计时
            let seconds = 30;
            const countdown = setInterval(() => {
                if (seconds > 0) {
                    seconds--;
                } else {
                    clearInterval(countdown);
                    showMessage('🌟 静心结束！你感觉更平静了吗？\n\n记住这种感觉，它会帮助你做出更好的选择！');
                    
                    // 添加一个特殊果实
                    addFruit('jin');
                }
            }, 1000);
        }
        
        // 品格日记
        function openDiary() {
            const today = new Date().toLocaleDateString('zh-CN');
            const diary = prompt(`📖 品格日记 - ${today}\n\n今天我注意到：\n1. 我什么时候像水一样谨慎？\n2. 我什么时候像光一样诚信？\n3. 我什么时候像风一样谨言？\n\n请写下你的觉察：`);
            
            if (diary && diary.trim()) {
                showMessage('📝 你的觉察已记录！\n\n这些思考的种子会在你心中慢慢长大！');
                
                // 添加一个特殊果实
                const types = ['jin', 'xin', 'yan'];
                const randomType = types[Math.floor(Math.random() * types.length)];
                addFruit(randomType);
            }
        }
        
        // 创建爱心动画
        function createHeartAnimation(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = '50px';
            heart.style.zIndex = '100';
            heart.style.animation = 'heartPulse 1.5s forwards';
            
            document.body.appendChild(heart);
            
            // 添加动画样式
            if (!document.querySelector('#heartPulseStyle')) {
                const style = document.createElement('style');
                style.id = 'heartPulseStyle';
                style.textContent = `
                    @keyframes heartPulse {
                        0% { transform: scale(0.2); opacity: 1; }
                        50% { transform: scale(1.3); opacity: 0.8; }
                        100% { transform: scale(0.5); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            setTimeout(() => heart.remove(), 1500);
        }
        
        // 显示消息
        function showMessage(text) {
            // 移除已存在的消息
            const existingMsg = document.querySelector('.message-bubble');
            if (existingMsg) existingMsg.remove();
            
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message-bubble');
            messageDiv.textContent = text;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '50%';
            messageDiv.style.left = '50%';
            messageDiv.style.transform = 'translate(-50%, -50%)';
            messageDiv.style.backgroundColor = 'rgba(255, 255, 255, 0.95)';
            messageDiv.style.color = '#5a3d8a';
            messageDiv.style.fontSize = '45px';
            messageDiv.style.padding = '40px 60px';
            messageDiv.style.borderRadius = '40px';
            messageDiv.style.border = '10px solid #8ac6ff';
            messageDiv.style.boxShadow = '0 20px 50px rgba(0,0,0,0.3)';
            messageDiv.style.zIndex = '1000';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.lineHeight = '1.5';
            messageDiv.style.maxWidth = '80%';
            
            document.body.appendChild(messageDiv);
            
            // 3秒后消失
            setTimeout(() => {
                messageDiv.style.transition = 'opacity 0.5s';
                messageDiv.style.opacity = '0';
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        document.body.removeChild(messageDiv);
                    }
                }, 500);
            }, 3000);
        }
        
        // 初始化
        window.onload = function() {
            createFloatingHearts();
            
            // 每10秒随机显示对话泡泡
            setInterval(showBubbles, 10000);

            const hasSavedState = loadState();
            if (!hasSavedState) {
                // 显示欢迎消息
                setTimeout(() => {
                    showMessage('👋 欢迎来到弟子规第二周！ 👋\n\n我是圣人爷爷，我要教你第二个爱的秘密：\n谨慎如水，诚信如光，谨言如风！');
                }, 1500);
                
                // 初始添加几个智慧果实
                setTimeout(() => addFruit('jin'), 3000);
                setTimeout(() => addFruit('xin'), 3500);
                setTimeout(() => addFruit('yan'), 4000);
            }
        };
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(event) {
            // 空格键添加随机智慧果实
            if (event.code === 'Space') {
                const types = ['jin', 'xin', 'yan'];
                const type = types[Math.floor(Math.random() * types.length)];
                addFruit(type);
                event.preventDefault();
            }
            
            // 回车键点亮智慧星
            if (event.code === 'Enter') {
                receiveWisdom();
                event.preventDefault();
            }
            
            // M键静心时刻
            if (event.code === 'KeyM') {
                startMeditation();
                event.preventDefault();
            }
            
            // D键品格日记
            if (event.code === 'KeyD') {
                openDiary();
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
